<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VaultofCodes Certificate Verifier</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="page">
        <section class="hero-card">
            <h1>VaultofCodes</h1>
            <h2>Certificate Verifier</h2>
            <p>Enter your Email or Certificate ID to verify internship details.</p>

            <div class="search-box">
                <input id="identifier" type="text" placeholder="Enter Email or Certificate ID">
                <button onclick="verifyStudent()">Verify Certificate</button>
            </div>
        </section>

        <div class="spinner hidden"></div>

        <section id="result"></section>
    </main>

    <div id="toast"></div>

    <script src="script.js"></script>
</body>
</html>
